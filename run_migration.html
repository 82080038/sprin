<!DOCTYPE html>
<html>
<head>
    <title>Run Migration - Add Urutan Column</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .container { background: #f5f5f5; padding: 30px; border-radius: 10px; }
        .btn { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Migration: Add Urutan Column to Bagian Table</h1>
        
        <div class="info">
            <p><strong>📋 Purpose:</strong> This migration will add the 'urutan' column to the bagian table to fix the ordering persistence issue.</p>
            <p><strong>⚠️ Important:</strong> This will update your database structure. Make sure you have a backup!</p>
        </div>
        
        <button class="btn" onclick="runMigration()">🚀 Run Migration</button>
        
        <div id="result"></div>
        
        <div id="details"></div>
    </div>

    <script>
        async function runMigration() {
            const resultDiv = document.getElementById('result');
            const detailsDiv = document.getElementById('details');
            
            resultDiv.innerHTML = '<div class="info">🔄 Running migration... Please wait...</div>';
            detailsDiv.innerHTML = '';
            
            try {
                // Step 1: Check if urutan column exists
                const checkResponse = await fetch('fix_bagian_urutan.php', {
                    method: 'GET'
                });
                
                if (!checkResponse.ok) {
                    throw new Error('Failed to run migration script');
                }
                
                const result = await checkResponse.text();
                
                resultDiv.innerHTML = '<div class="success">✅ Migration completed successfully!</div>';
                detailsDiv.innerHTML = `
                    <h3>📊 Migration Details:</h3>
                    <pre style="background: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto;">${result}</pre>
                    <p><strong>🎯 Next Steps:</strong></p>
                    <ol>
                        <li>Go to <a href="/sprint/pages/bagian.php" target="_blank">Bagian Management Page</a></li>
                        <li>Try drag-and-drop to reorder bagian</li>
                        <li>Click "Simpan Perubahan" to save</li>
                        <li>Reload the page to verify order persists</li>
                    </ol>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Migration failed: ${error.message}</div>`;
                detailsDiv.innerHTML = `
                    <h3>🔍 Troubleshooting:</h3>
                    <p>Make sure:</p>
                    <ul>
                        <li>XAMPP/MYSQL is running</li>
                        <li>Database connection is working</li>
                        <li>File permissions are correct</li>
                    </ul>
                `;
            }
        }
    </script>
</body>
</html>
