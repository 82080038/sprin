<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>256 Personil Data Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #7f8c8d;
            font-size: 18px;
        }
        
        .table-container {
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .data-table {
            font-size: 14px;
            margin-bottom: 0;
        }
        
        .data-table thead {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            z-index: 10;
        }
        
        .data-table th {
            border: none;
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            font-size: 13px;
        }
        
        .data-table td {
            padding: 12px 10px;
            vertical-align: middle;
            border-bottom: 1px solid #e0e0e0;
            font-size: 13px;
        }
        
        .data-table tbody tr:hover {
            background-color: #f8f9fa;
            transition: background-color 0.3s ease;
        }
        
        .no {
            font-weight: 600;
            text-align: center;
            color: #667eea;
        }
        
        .nama {
            font-weight: 600;
            color: #2c3e50;
            min-width: 250px;
        }
        
        .nrp {
            font-family: 'Courier New', monospace;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
            color: #495057;
        }
        
        .pangkat {
            background: linear-gradient(135deg, #fd7e14 0%, #dc3545 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }
        
        .unit {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }
        
        .jabatan {
            background: linear-gradient(135deg, #007bff 0%, #6f42c1 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }
        
        .keterangan {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }
        
        .keterangan-empty {
            color: #6c757d;
            font-style: italic;
            font-size: 12px;
        }
        
        .status {
            text-align: center;
        }
        
        .status-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        
        .status-active {
            background-color: #28a745;
        }
        
        .status-inactive {
            background-color: #dc3545;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .error {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            min-width: 150px;
            margin: 5px;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .data-table {
                font-size: 11px;
            }
            
            .data-table th,
            .data-table td {
                padding: 8px 5px;
            }
            
            .pangkat, .unit, .jabatan, .keterangan {
                font-size: 9px;
                padding: 2px 4px;
            }
            
            .nama {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-users me-3"></i>Data Personil SPRIN</h1>
            <p>Data lengkap personil dari personil_complete_data.json</p>
        </div>

        <!-- Statistics -->
        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">-</div>
                <div class="stat-label">Total Personil</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="activeCount">-</div>
                <div class="stat-label">Personil Aktif</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="unitCount">-</div>
                <div class="stat-label">Total Unit</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="jabatanCount">-</div>
                <div class="stat-label">Total Jabatan</div>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Memuat data personil...</p>
        </div>

        <!-- Error Message -->
        <div class="error" id="error" style="display: none;">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="errorText">Error loading data</span>
        </div>

        <!-- Table -->
        <div class="table-container" id="tableContainer" style="display: none;">
            <table class="table table-hover data-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">No</th>
                        <th style="width: 250px;">Nama</th>
                        <th style="width: 100px;">NRP</th>
                        <th style="width: 80px;">Pangkat</th>
                        <th style="width: 120px;">Unit</th>
                        <th style="width: 200px;">Jabatan</th>
                        <th style="width: 150px;">Keterangan</th>
                        <th style="width: 80px;">Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let personilData = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });

        // Load data
        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const tableContainer = document.getElementById('tableContainer');
            
            try {
                const response = await fetch('file/personil_complete_data.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                personilData = data.personil_data || [];
                
                if (personilData.length === 0) {
                    throw new Error('No personil data found');
                }
                
                updateStatistics(data.metadata);
                renderTable();
                
                loading.style.display = 'none';
                tableContainer.style.display = 'block';
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('errorText').textContent = `Gagal memuat data: ${error.message}`;
                error.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        // Update statistics
        function updateStatistics(metadata) {
            document.getElementById('totalCount').textContent = personilData.length;
            
            const activeCount = personilData.filter(p => p.is_active === true).length;
            document.getElementById('activeCount').textContent = activeCount;
            
            const units = [...new Set(personilData.map(p => p.unit).filter(u => u && u.trim() !== ''))].length;
            document.getElementById('unitCount').textContent = units;
            
            const jabatans = [...new Set(personilData.map(p => p.jabatan).filter(j => j && j.trim() !== ''))].length;
            document.getElementById('jabatanCount').textContent = jabatans;
        }

        // Render table
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            
            tableBody.innerHTML = '';
            
            personilData.forEach((personil, index) => {
                const row = document.createElement('tr');
                
                // Handle null/undefined values
                const nama = personil.nama || 'Tidak ada nama';
                const nrp = personil.nrp || 'Tidak ada NRP';
                const pangkat = personil.pangkat || 'Tidak ada pangkat';
                const unit = personil.unit || 'Tidak ada unit';
                const jabatan = personil.jabatan || 'Tidak ada jabatan';
                const keterangan = personil.keterangan;
                const isActive = personil.is_active === true;
                
                // Format keterangan display
                let keteranganDisplay = '';
                if (keterangan === null || keterangan === undefined || keterangan === '') {
                    keteranganDisplay = '<span class="keterangan-empty">-</span>';
                } else {
                    keteranganDisplay = `<span class="keterangan">${keterangan}</span>`;
                }
                
                row.innerHTML = `
                    <td class="no">${index + 1}</td>
                    <td class="nama">${nama}</td>
                    <td><span class="nrp">${nrp}</span></td>
                    <td><span class="pangkat">${pangkat}</span></td>
                    <td><span class="unit">${unit}</span></td>
                    <td><span class="jabatan">${jabatan}</span></td>
                    <td>${keteranganDisplay}</td>
                    <td class="status">
                        <span class="status-badge ${isActive ? 'status-active' : 'status-inactive'}"></span>
                        ${isActive ? 'Aktif' : 'Tidak Aktif'}
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }
    </script>
</body>
</html>
